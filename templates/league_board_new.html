{% extends "league_layout.html" %}

{% block layout_class %}no-sidebars{% endblock %}

{% block league_content %}
<div style="max-width: 700px;">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
        <a href="{{ url_for('league_board', league_id=league.id) }}" class="muted" style="text-decoration: none; font-size: 0.9em;">← Back to Board</a>
    </div>

    <div class="card panel">
        <h3 style="margin-top: 0; color: var(--primary-color);">💬 New Thread</h3>
        <form action="{{ url_for('league_board_new_thread', league_id=league.id) }}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label style="display: block; font-weight: bold; font-size: 0.9em; margin-bottom: 5px;">Thread Title</label>
                <input type="text" name="title" required maxlength="120" placeholder="What's this about?"
                       style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); box-sizing: border-box; font-size: 1em;">
            </div>
            <div>
                <label style="display: block; font-weight: bold; font-size: 0.9em; margin-bottom: 5px;">Message</label>
                <textarea name="content" required rows="6" placeholder="Write your message..."
                          style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); box-sizing: border-box; font-size: 0.95em; resize: vertical; font-family: inherit;"></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn">Post Thread</button>
                <a href="{{ url_for('league_board', league_id=league.id) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
