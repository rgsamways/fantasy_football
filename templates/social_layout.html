{% extends "layout.html" %}

{% block full_width %}
<div class="sub-nav">
    <ul>
        <li>
            <a href="{{ url_for('social_home') }}" class="{{ 'active' if active_tab == 'home' }}">
                <i data-lucide="radio"></i>
                <span class="nav-label">Channels</span>
            </a>
        </li>
    </ul>
</div>
{% endblock %}

{% block vertical_nav %}
<a href="{{ url_for('social_home') }}" data-label="Channels" class="{{ 'active' if active_tab == 'home' }}"><i data-lucide="radio"></i> Channels</a>
{% endblock %}

{% block content %}
<div class="league-layout {% block layout_class %}{% endblock %}">
    <aside class="sidebar-left">
        {% block social_sidebar_left %}{% endblock %}
    </aside>

    <main class="league-main-content">
        {% block social_content %}{% endblock %}
    </main>

    <aside class="sidebar-right">
        {% block social_sidebar_right %}{% endblock %}
    </aside>
</div>
{% endblock %}
