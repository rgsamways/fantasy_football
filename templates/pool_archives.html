{% extends "pool_layout.html" %}

{% block layout_class %}no-sidebars{% endblock %}

{% block pool_content %}
<div class="card panel" style="max-width: 600px; margin: 0 auto; text-align: center; padding: 50px 30px;">
    <div style="font-size: 2.5rem; margin-bottom: 12px;">🏆</div>
    <h2 style="margin-top: 0; color: var(--primary-color);">Archives</h2>
    <p style="color: var(--muted-color);">Past season results will appear here once a season has been completed.</p>
    <a href="{{ url_for('pool_standings', pool_id=pool.id) }}" class="btn btn-sm" style="margin-top: 10px;">Current Standings</a>
</div>
{% endblock %}
