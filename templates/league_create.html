{% extends "leagues_layout.html" %}

{% block layout_class %}no-sidebars{% endblock %}

{% block leagues_content %}
<div class="leagues-header" style="margin-bottom: 30px; text-align: center;">
    <h2>Create New League</h2>
    <p>Start your own championship and invite other managers to join.</p>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto; padding: 30px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--card-bg); color: var(--text-color); border-top: 4px solid var(--primary-color);">
    <form action="{{ url_for('create_league') }}" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
        <div class="form-group">
            <label for="league_name" style="font-weight: bold; display: block; margin-bottom: 8px;">League Name:</label>
            <input type="text" id="league_name" name="league_name" required class="form-control" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--input-border);">
        </div>
        
        <div class="form-group">
            <label for="league_type" style="font-weight: bold; display: block; margin-bottom: 8px;">League Type:</label>
            <select id="league_type" name="league_type" required class="form-control" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--input-border);">
                <option value="Redraft" {{ 'selected' if selected_type == 'Redraft' }}>Redraft</option>
                <option value="Keeper" {{ 'selected' if selected_type == 'Keeper' }}>Keeper</option>
                <option value="Dynasty" {{ 'selected' if selected_type == 'Dynasty' }}>Dynasty</option>
                <option value="Best Ball" {{ 'selected' if selected_type == 'Best Ball' }}>Best Ball</option>
                <option value="Vampire" {{ 'selected' if selected_type == 'Vampire' }}>Vampire</option>
                <option value="Guillotine" {{ 'selected' if selected_type == 'Guillotine' }}>Guillotine</option>
            </select>
        </div>

        <div class="form-group">
            <label for="scoring_format" style="font-weight: bold; display: block; margin-bottom: 8px;">Scoring Format:</label>
            <select id="scoring_format" name="scoring_format" required class="form-control" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--input-border);">
                <option value="PPR">PPR</option>
                <option value="Half-PPR">Half-PPR</option>
                <option value="Standard">Standard</option>
            </select>
        </div>

        <div class="form-group">
            <label for="positional_format" style="font-weight: bold; display: block; margin-bottom: 8px;">Positional Format:</label>
            <select id="positional_format" name="positional_format" required class="form-control" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--input-border);">
                <option value="Standard">Standard (QB, 2RB, 2WR, TE, FLEX, K, DST)</option>
                <option value="SuperFlex">SuperFlex (Standard + QB/RB/WR/TE Flex)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="play_format" style="font-weight: bold; display: block; margin-bottom: 8px;">Play Format:</label>
            <select id="play_format" name="play_format" required class="form-control" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--input-border);">
                <option value="Head-2-Head">Head-2-Head</option>
                <option value="Season-long">Season-long</option>
            </select>
        </div>

        <div id="division_settings">
            <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <input type="checkbox" id="has_divisions" name="has_divisions" style="width: 20px; height: 20px;">
                <label for="has_divisions" style="font-weight: bold;">Enable Divisions</label>
            </div>

            <div id="num_divisions_container" class="form-group" style="display: none; margin-left: 30px;">
                <label for="num_divisions" style="font-weight: bold; display: block; margin-bottom: 8px;">Number of Divisions:</label>
                <input type="number" id="num_divisions" name="num_divisions" value="2" min="2" max="8" class="form-control" style="width: 100%; max-width: 150px; padding: 10px; border-radius: 4px; border: 1px solid var(--input-border);">
            </div>
        </div>

        <div class="form-group">
            <label for="max_teams" style="font-weight: bold; display: block; margin-bottom: 8px;">Number of Teams:</label>
            <input type="number" id="max_teams" name="max_teams" value="12" min="2" max="32" required class="form-control" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--input-border);">
            <small style="color: var(--muted-color);">Standard is 12. Maximum is 32.</small>
        </div>

        <script>
        document.addEventListener('DOMContentLoaded', function() {
            const playFormat = document.getElementById('play_format');
            const divisionSettings = document.getElementById('division_settings');
            const hasDivisions = document.getElementById('has_divisions');
            const numDivisionsContainer = document.getElementById('num_divisions_container');

            function toggleDivisionSettings() {
                if (playFormat.value === 'Head-2-Head') {
                    divisionSettings.style.display = 'block';
                } else {
                    divisionSettings.style.display = 'none';
                    hasDivisions.checked = false;
                    numDivisionsContainer.style.display = 'none';
                }
            }

            function toggleNumDivisions() {
                if (hasDivisions.checked) {
                    numDivisionsContainer.style.display = 'block';
                } else {
                    numDivisionsContainer.style.display = 'none';
                }
            }

            playFormat.addEventListener('change', toggleDivisionSettings);
            hasDivisions.addEventListener('change', toggleNumDivisions);
            
            // Initial state
            toggleDivisionSettings();
        });
        </script>
        
        <div style="margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 20px;">
            <button type="submit" class="btn" style="width: 100%;">Create League</button>
            <a href="{{ url_for('leagues_types') }}" class="btn btn-secondary" style="width: 100%; margin-top: 10px; text-align: center;">Back to League Types</a>
        </div>
    </form>
</div>
{% endblock %}
